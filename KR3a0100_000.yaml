body:
  text: 溫氏母訓儒家類提要臣等謹案溫氏母訓一卷明溫璜録其母陸氏之訓也璜初名以介字于石號石公後以夢兆改今名而字曰寶忠烏程人崇禎癸未進士官徽州府推官事迹附見明史邱祖德傳乾隆四十一年賜諡忠烈璜有遺集十二卷此書其卷末所附録語雖質直而頗切事理末有跋語不著名氏稱原集繁重不便單行乃録出再付之梓案璜於順治乙酉起兵與金聲相應以拒王師凡四閲月城破抗節以死其氣節震耀一世可謂不愧於母教又髙承埏忠節録載璜就義之日慨然語妻茅氏曰吾生平學為聖賢不過求今日處死之道耳因繞屋而走茅氏曰君之遲留得無以我及長女寶德在乎時女已寢母呼之起女問何為母曰死耳女曰諾即延頸受死璜手刃之茅氏亦臥牀引頸待刃璜復斫死乃自剄知其家庭之間素以名教相砥礪故皆能臨難從容如是非徒託之空言者矣故雖女子之言特録其書於儒家示進之也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書溫氏母訓明溫璜述窮秀才譴責下人至鞭撲而極矣暫行知警常用則玩教兒子亦然貧人不肯祭祀不通慶弔斯貧而不可返者矣祭祀絶是與祖宗不相往來慶弔絶是與親友不相往來名曰獨夫天人不祐凡無子而寡者斷宜依向嫡姪為是老病終無他諉祭祀近有感通愛女愛壻決難到底同住同住到底免不得一番擾攘官司也凡寡婦雖親子姪兄弟只在公堂議事不得孤召密囑寡居有婢僕者夜作明燈往來少寡不必勸之守不必強之改自有直捷相法只看晏眠蚤起惡逸好勞忙忙地無一刻丢空者此必守志人也身勤則念專貧也不知愁富也不知樂便是鐵石手段若有半晌偷間老守終無結果吾有相法要訣曰寡婦勤一字經婦女只許粗識柴米魚肉數百字多識字無益而有損也貧人勿説大話婦人勿説漢話愚人勿説乖話薄福人勿説滿話職業人勿説間話凡人同堂同室同窗多年者情誼深長其中不無敗類之人是非自有公論在我當存厚道世人眼赤赤只見黃銅白鐵受了斗米串錢便聲聲叫大恩德至如一鄉一族有大宰官當風抵浪的有博學雄才開人膽智的有髙年先輩道貌誠心後生小子步其孝弟長厚終身受用不窮的這等大濟益處人却埋沒不提才是隂德但願親戚人人豐足寧我隻貧自守若使一人富厚九族飢寒便是極缺陷處非大忍辱人不能周旋其間周旋親友只看自家力量隨緣答應窮親窮眷放他便宜一兩處才得消讒免謗凡人説他兒子不肖還要照管伊父體面説他婆子不好還要照管伊夫體面有一等人攛販風聞為害不小有一等人認定風聞指為左劵布傳逺近有一等人直腸直口自謂不欺每為造言揑謗誘作先鋒為害更甚貧家無門禁然童女倚簾窺幕鄰兒穿房入闥各以幼小不禁此家教不可為訓處中年喪偶一不幸也喪偶事小正為續絃費處前邉兒女先將古來許多晚娘惡件填在胸坎這邉新婦父母保婢唆教自立馬頭兩邉間雜人占風望氣弄去搬來外邉無干人聽得一句兩句只肯信歹不肯信好真是清官亦判斷不開不幸之苦全在於此然則如之奈何只要做家主的一者用心周到二者立身端正人生只消受得一箇巴字日巴晚月巴圓農夫巴一年科舉巴三年官長巴六年九年父巴子子巴孫巴得歇得便是好漢子凡父子姑息積成嫌隙畢竟上人要認一半過失其胸中橫竪道卑幼奈我不得富家兄弟各門别戶最易生嫌勤邀杯酒時常見面此亦逺讒間之法貧人未能發迹先求自立只看幾人在坐偶失物件必指貧者為盜藪幾人在坐羣然作弄必指貧者為話柄人若不能自立這些光景受也要你受不受也要你受寡婦弗輕受人惠兒子愚我欲報而報不成兒子賢人望報而報不足我生平不受人惠兩手拮據柴米不缺其餘有也挨過無也挨過我生平不借債結會此念一起早夜見人不是作家的將祖宗緊要做不到事補一兩件做官的將地方緊要做不到事幹一兩件才是男子結果髙爵多金還不算是結果人言日月相望所以為望還是月亮望日所以圓滿不久也你只看世上有貧人仰望富人的有小人仰望貴人的只好暫時照顧如十五六夜月耳安得時時償你缺陷待到月亮盡情烏有那時日影再來光顧些須此天上榜樣也貧賤求人時時滿望勢所必無可不三思兒子是天生的不是打成的古云棒頭出肖子不知是銅打就銅器是鐵打就鐵器若把驢頭打作馬面有是理否逺邪佞是富家教子第一義逺恥辱是貧家教子第一義至于科第文章總是兒郎自家本事貴客下交寒素何必謝絶蔬水往還大是美事只貴人減騶從便是相諒貧士少干求便是可久之道也朋友通財是常事只恐無器量的承受不起所以在彼名為恩在我當知感古來鮑子容得管子却是管子容得鮑子譬如千尋松樹任他雨露繁滋挺挺承當得起世間輕財好施之子每到骨肉反多恚吝其説有二他人蒙惠一絲一粒連聲叫感至親視為固然之事一不堪也他人至再至三便難啓口至親引為久常之例二不堪也但到此處正如啞子黃連説苦不得或兄弟而父母髙堂或叔姪而翁姑尚在一團情分礪斧難斷稍有念頭防其干涉杜其借貸將必牢拴門戶狠作聲氣把天生一副惻隱心腸蓋藏殆盡方可坐視不救如此便比路人仇敵更進一層豈可如此汝深記我言富貴之交意氣驟濃者當防其驟奪凡驟者不恆只平平自好凡富家子弟交雜者雖在師位不可急離其交急離之則怨謗頓生不可顯斥其交顯斥之益固其合但當正以自持相機而導介告母曰古人治生為急一讀書生事嗇矣母曰士農工商各執一業各人各治所生讀書便是生活問介侃母髙在何處介曰剪髮餉人人所難到母曰非也吾觀陶侃運甓習勞乃知其母平日教有本也問介吾族多貧何也介曰比自葵軒公生四子分田一千六百畝今子孫六傳産費丁繁安得不貧母曰豈有子孫專靠祖宗過活天生一人自料一人衣祿若肯髙低各執一業大小自成結果今見各房子弟長袖大衫酒食安飽父母愛之不敢言勞雖使先人貽百萬資坐困必矣世人多被心腸好三字壞了假如你念頭要做好兒子須外面實有一般孝順行徑你念頭要做好秀才須外面實有一般勤苦行徑心腸是無形無影的有何憑據凡説心腸好者多是規避樣子中等之人心腸定是無他只為氣質粗慢語言鄙悖外人不肯容恕當爾時豈得自恃無他將心唐突世多誤認直字如汝讀書只曉讀書一路到底這便是直人汝自家著實讀書方説他人不肯讀書這便是直言今人謂直却是方底罵圓蓋耳毒口快腸出爾反爾豈得直哉貧家兒女無甚享用只有早上一揖髙叫深恭大是恩至每見汝一勺便走慌張張有何情味讀書到二三十嵗定要見些氣象便是著衣喫飯也算人生一件事每見汝吃飯忙忙碌碌若無一絲空地及至飯畢却又間蕩可是有意思人治生是要緊事汝與常兒不同吾辛苦到此幸汝成立萬一飢寒切身外間論汝是何等人人有父母妻子如身有耳目口鼻都是生而具的何可不一經理只為俗物將精神意趣全副交與家緣這便喚作家人不喚讀書人貧富何常只要自身上通達得去是故貧當思通不在守分富當思通不在知足不缺祭享不失慶弔不斷書香此貧則思通之法也仗義周急尊師禮賢此富則思通之法也勞如我不成怯症世無病怯者苦如我不成鬱症世無病鬱者做人家切弗貪富只如俗言從容二字甚好富無窮極且如千萬人家浪費浪用儘有窘迫時節假若八口之家能勤能儉得十口資糧六口之家能勤能儉得八口資糧便有二分餘剩何等寬舒何等康泰過失與習氣相别偶一差錯只算過悮至再至三便成習非是處極要點察凡親友急難切不可閉門坐視然亦不可執性莽做世間事不是件件幹得才喚幹人汝與朋友相與只取其長勿計其短如遇剛鯁人須耐他戾氣遇駿逸人須耐他罔氣遇朴厚人須耐他滯氣遇佻達人須耐他浮氣不徒取益無方亦是全交之法閉門課子非獨前程逺大不見匪人最是得力堂上有白頭子孫之福堂上有白頭故舊聨絡一也鄉黨信服二也子孫稟令僮僕遺規三也談説祖宗故事與郡邑先輩典型四也解和少年暴急五也照料瑣細六也父子主僕最忌小處煩碎煩碎相對面目可憎懶記帳籍亦是一病奴僕因緣為姦子孫猜疑成隙皆由于此家庭禮數貴簡而安不欲煩而勉富貴一層繁瑣一層繁瑣一分疏濶一分人家子弟作揖髙叫深恭絶好家法凡蒙師教初學須從此起凡子弟每事一稟命于所尊便是孝弟吾聞沈侍郎家法有客至呼子弟坐侍不設杯箸俟酒畢另與子弟常蔬同飯此蒙訓恭儉之方曽祖母告誡汝祖汝父云人雖窮餓切不可輕棄祖基祖基一失便是落葉不得歸根之苦吾寧日日減餐一頓以守尺寸之土也出廚嘗以手捫鍋蓋不使兒女輩滅竈更燃今各房基地皆有變賣轉移獨吾家無恙豈容易得到今日念之念之汝大父赤貧曽借朱姓者二十金賣米以糊口逾年朱姓者病且篤朱為兩槐公紀綱不敢以私債使聞主人旁人私幸以為可負也時大父正客姑熟偶得朱信星夜趕歸不至家竟持前欠本利至朱姓處朱巳不能言大父徐徐出所持銀告之曰前欠一一具奉乞看過收明朱姓忽蹶起頌言曰世上有如君忠信人哉吾口眼閉矣願君世世生賢子孫言已氣絶大父遂哭别而歸家人詢知其還欠或騃之大父曰吾故騃所以不到家者恐為汝輩所惑也如此盛德汝曹可不書紳問世間何者最樂母曰不放債不欠債的人家不大豐不大歉的年時不奢華不盜賊的地方此最難得免飢寒的貧士學孝弟的秀才通文義的商賈知稼穡的公子舊面目的宰官此尤難得也凡人一味好盡無故得謗凡人一味不拘無故得謗凡寡婦不禁子弟出入房閣無故得謗寡婦盛飾容貌無故得謗婦人屢出燒香看戲無故得謗嚴刻僕𨽻菲薄鄉黨無故得謗凡人家處前後嫡庶妻妾之間者不論是非曲直只有塞耳閉口為髙用氣性者自討苦喫聨屬下人莫如減冗員而寬口食做人家髙低有一條活路便好凡與人田産錢財交涉者定要隨時討箇決絶拖延生事婦人不諳中饋不入廚堂不可以治家使婦人得以結伴聨社呈身露而不可以齊家受謗之事有必要辨者有必不可辨者如係田産錢財的遲則難解此必要辨者也如係閨閫的靜則自消此必不可辨者也如係口舌是非的久當自明此不必辨者也凡人氣盛時切莫説道吾性子定要這樣的我今日定要這樣的驀直做去畢竟有搕撞世間富貴不如文章文章不如道德却不知還有兩項壓倒在上面的一者名分賢子弟決難漫滅親長賢有司決難侮傲上臺一者氣運儘有富貴交著衰運儘有文章遭著厄運儘有道德逢著末運聖賢卿相做不得自主問介子夏問孝子曰色難如何解説介跪講畢母曰依我看來世間只有兩項人是色難有一項性急人烈烈轟轟凡事無不敏捷只有在父母跟前一味自張自主的氣質父母其實難當有一項性慢人落落拓拓凡事討盡便宜只有在父母跟前一畨不痛不癢的面孔父母便覺難當問介至於犬馬皆能有養不敬何以别乎如何解説介跪講畢母曰這箇敬字不要文皺皺説許多道理但是人子肯把犬馬二字常在心裏省覺便是恭敬孝順你看世上兒子凡日間任勞任重的都推與父母去做明明養父母直比養馬了凡夜間晏眠早起的都付與父母去守明明養父母直比養犬了將人比畜怪其不倫况把爹娘禽獸看待此心何忍禽獸父母誰肯承認却不知不覺日置父母于禽獸中也一念及此通身汗下只消人子將父母禽獸分别出來勾恭敬了勾孝順了人當大怒大忿之後睡了一夜還要思量溫氏母訓溫氏母訓跋于石先生以崇禎丙子舉于鄉後更名璜舉癸未禮闈筮仕徽司理疆事壞死之先帝后以節烈風萬世公夫人長女從容就實上嫓休光焉遺集十二卷末述先訓乃母夫人陸所身教口授者信乎家法有素而賢母之造就不虛也夫顔訓袁範世稱善則類皆哲士之所修立未聞宫師垂誡踵季婦大家而有言也者有之自節孝始矣厚集繁重不利單行爰再付梓讀者其廣知奮興乎
